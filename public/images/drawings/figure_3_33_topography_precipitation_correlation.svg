<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="900" viewBox="0 0 1800 900">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6f6f6"/>
    </linearGradient>

    <linearGradient id="terrainFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#92b97a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e9f1e4" stop-opacity="0.95"/>
    </linearGradient>

    <linearGradient id="rainRibbon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a9d4ee"/>
      <stop offset="55%" stop-color="#4f8fc5"/>
      <stop offset="100%" stop-color="#234f9a"/>
    </linearGradient>

    <marker id="arrowBlue" markerWidth="22" markerHeight="22" refX="20" refY="11"
            orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L22,11 L0,22 z" fill="#234f9a"/>
    </marker>

    <marker id="arrowBlack" markerWidth="18" markerHeight="18" refX="16" refY="9"
            orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L18,9 L0,18 z" fill="#000"/>
    </marker>

    <style>
      .title { font-family: Helvetica, Arial, sans-serif; font-size: 40px; font-weight: 800; fill:#000; }
      .axisLbl { font-family: Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 700; fill:#000; }
      .tickLbl { font-family: Helvetica, Arial, sans-serif; font-size: 22px; fill:#000; }
      .zoneHdr { font-family: Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 800; fill:#000; }
      .zoneTxt { font-family: Helvetica, Arial, sans-serif; font-size: 20px; fill:#000; }
      .midLbl { font-family: Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 700; fill:#000; }
      .sml { font-family: Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 600; fill:#000; }
      .grid { stroke:#bcbcbc; stroke-width:2; }
      .axis { stroke:#000; stroke-width:4; }
      .dash { stroke:#000; stroke-width:2.5; stroke-dasharray:8,8; }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="900" fill="url(#bg)"/>

  <text x="70" y="70" class="title">Figure 3.33: Topography-Precipitation Correlation</text>

  <g>
    <g class="grid">
      <line x1="120" y1="670" x2="1720" y2="670"/>
      <line x1="120" y1="576" x2="1720" y2="576"/>
      <line x1="120" y1="483" x2="1720" y2="483"/>
      <line x1="120" y1="390" x2="1720" y2="390"/>
      <line x1="120" y1="296" x2="1720" y2="296"/>
      <line x1="120" y1="203" x2="1720" y2="203"/>
      <line x1="120" y1="110" x2="1720" y2="110"/>
    </g>

    <line x1="120" y1="110" x2="120" y2="670" class="axis"/>
    <line x1="120" y1="670" x2="1720" y2="670" class="axis"/>

    <line x1="120" y1="110" x2="120" y2="95" stroke="#000" stroke-width="4" marker-end="url(#arrowBlack)"/>
    <line x1="1720" y1="670" x2="1735" y2="670" stroke="#000" stroke-width="4" marker-end="url(#arrowBlack)"/>

    <g class="tickLbl">
      <text x="90" y="678" text-anchor="end">0</text>
      <text x="90" y="584" text-anchor="end">1,000</text>
      <text x="90" y="491" text-anchor="end">2,000</text>
      <text x="90" y="398" text-anchor="end">3,000</text>
      <text x="90" y="304" text-anchor="end">4,000</text>
      <text x="90" y="211" text-anchor="end">5,000</text>
      <text x="90" y="118" text-anchor="end">6,000</text>
    </g>

    <text x="35" y="430" transform="rotate(-90 35,430)" class="axisLbl">
      Elevation (ft) / Annual Rainfall (inches)
    </text>

    <text x="920" y="735" text-anchor="middle" class="axisLbl">
      Distance from Coast (Makai to Mauka)
    </text>
  </g>

  <g class="dash">
    <line x1="520" y1="110" x2="520" y2="670"/>
    <line x1="900" y1="110" x2="900" y2="670"/>
    <line x1="1280" y1="110" x2="1280" y2="670"/>
  </g>

  <path d="
    M120 670
    L120 610
    C220 600, 310 590, 380 585
    C450 580, 500 575, 560 565
    C640 552, 720 540, 820 520
    C920 500, 1030 470, 1120 440
    C1210 410, 1290 370, 1360 330
    C1440 285, 1515 230, 1580 175
    C1630 132, 1675 130, 1720 155
    L1720 670
    Z"
    fill="url(#terrainFill)" stroke="#5a7f45" stroke-width="6" stroke-linejoin="round"/>

  <path d="
    M120 610
    C220 600, 310 590, 380 585
    C450 580, 500 575, 560 565
    C640 552, 720 540, 820 520
    C920 500, 1030 470, 1120 440
    C1210 410, 1290 370, 1360 330
    C1440 285, 1515 230, 1580 175
    C1630 132, 1675 130, 1720 155"
    fill="none" stroke="#4f7a3f" stroke-width="8" stroke-linecap="round"/>

  <path d="
    M150 505
    C420 470, 680 450, 930 380
    C1190 310, 1400 240, 1640 160"
    fill="none" stroke="url(#rainRibbon)" stroke-width="40"
    stroke-linecap="round" stroke-linejoin="round"
    marker-end="url(#arrowBlue)"/>

  <text x="130" y="520" class="sml">&lt;15 inches</text>
  <text x="1500" y="170" class="sml">300+ inches</text>
  <text x="820" y="320" class="midLbl" transform="rotate(-16 820,320)">Rainfall Gradient</text>

  <path d="M1060 420 C960 450, 880 470, 820 490"
        stroke="#000" stroke-width="6" fill="none" marker-end="url(#arrowBlack)" stroke-linecap="round"/>
  <text x="925" y="435" class="midLbl" transform="rotate(-12 925,435)">Gravity-Fed Flow Potential</text>

  <text x="1375" y="105" class="midLbl">Pu‘u Kukui Summit (5,788 ft)</text>

  <text x="160" y="615" class="midLbl">Lahaina Coastal Zone</text>
  <text x="610" y="545" class="midLbl">Coastal Plain</text>
  <text x="990" y="505" class="midLbl" transform="rotate(-10 990,505)">Peri-Urban</text>
  <text x="1400" y="430" class="midLbl" transform="rotate(-35 1400,430)">West Maui Mountains</text>

  <g>
    <rect x="120" y="690" width="400" height="180" fill="#fff" stroke="#000" stroke-width="3"/>
    <rect x="520" y="690" width="380" height="180" fill="#fff" stroke="#000" stroke-width="3"/>
    <rect x="900" y="690" width="380" height="180" fill="#fff" stroke="#000" stroke-width="3"/>
    <rect x="1280" y="690" width="440" height="180" fill="#fff" stroke="#000" stroke-width="3"/>

    <text x="320" y="735" text-anchor="middle" class="zoneHdr">Coastal Zone (0–20 ft)</text>
    <text x="710" y="735" text-anchor="middle" class="zoneHdr">Coastal Plain (20–200 ft)</text>
    <text x="1090" y="735" text-anchor="middle" class="zoneHdr">Peri-Urban (200–1,000 ft)</text>
    <text x="1500" y="735" text-anchor="middle" class="zoneHdr">Hinterland (&gt;1,000 ft)</text>

    <text x="140" y="775" class="zoneTxt">Buffer: Arid, groundwater</text>
    <text x="140" y="800" class="zoneTxt">discharge, tidal influence.</text>

    <text x="540" y="775" class="zoneTxt">Urban Core: Primary</text>
    <text x="540" y="800" class="zoneTxt">consumption, dependent on</text>
    <text x="540" y="825" class="zoneTxt">delivered upland water.</text>
    <text x="540" y="855" class="zoneTxt">15–20 inches.</text>

    <text x="920" y="775" class="zoneTxt">Transition: Runoff transport,</text>
    <text x="920" y="800" class="zoneTxt">aquifer recharge, interception</text>
    <text x="920" y="825" class="zoneTxt">via ditch rehabilitation.</text>
    <text x="920" y="855" class="zoneTxt">20–60 inches.</text>

    <text x="1300" y="775" class="zoneTxt">Primary Source: Orographic</text>
    <text x="1300" y="800" class="zoneTxt">capture, fog drip, high potential</text>
    <text x="1300" y="825" class="zoneTxt">for gravity-fed reservoirs.</text>
    <text x="1300" y="855" class="zoneTxt">100–300+ inches.</text>
  </g>

</svg>
