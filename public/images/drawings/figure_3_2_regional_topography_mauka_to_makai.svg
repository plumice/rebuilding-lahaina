<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800">

  <defs>
    <!-- Terrain gradient (mountains -> coast) -->
    <linearGradient id="terrainGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2f6b3f"/>
      <stop offset="55%" stop-color="#79a9a1"/>
      <stop offset="100%" stop-color="#a9cfe6"/>
    </linearGradient>

    <!-- Ocean gradient -->
    <linearGradient id="oceanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f86b9"/>
      <stop offset="100%" stop-color="#0b5e86"/>
    </linearGradient>

    <!-- Arrow marker -->
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="14" refY="8"
            orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L16,8 L0,16 z" fill="#000"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1400" height="800" fill="#fff"/>

  <!-- Plot area frame variables (manual) -->
  <!-- Plot origin: (140,120). Plot size: 1180x540. -->
  <!-- Axes -->
  <g stroke="#000" stroke-width="3" fill="none" stroke-linecap="square">
    <line x1="140" y1="120" x2="140" y2="660"/>
    <line x1="140" y1="660" x2="1320" y2="660"/>
  </g>

  <!-- Y-axis ticks and labels (0 to 3500) -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#000">
    <!-- tick helper: y = 660 - (value/3500)*540 -->
    <!-- 0 -->
    <line x1="140" y1="660" x2="122" y2="660" stroke="#000" stroke-width="3"/>
    <text x="95" y="668" text-anchor="end">0</text>
    <!-- 500 -->
    <line x1="140" y1="583" x2="122" y2="583" stroke="#000" stroke-width="3"/>
    <text x="95" y="591" text-anchor="end">500</text>
    <!-- 1000 -->
    <line x1="140" y1="506" x2="122" y2="506" stroke="#000" stroke-width="3"/>
    <text x="95" y="514" text-anchor="end">1000</text>
    <!-- 1500 -->
    <line x1="140" y1="429" x2="122" y2="429" stroke="#000" stroke-width="3"/>
    <text x="95" y="437" text-anchor="end">1500</text>
    <!-- 2000 -->
    <line x1="140" y1="352" x2="122" y2="352" stroke="#000" stroke-width="3"/>
    <text x="95" y="360" text-anchor="end">2000</text>
    <!-- 2500 -->
    <line x1="140" y1="275" x2="122" y2="275" stroke="#000" stroke-width="3"/>
    <text x="95" y="283" text-anchor="end">2500</text>
    <!-- 3000 -->
    <line x1="140" y1="198" x2="122" y2="198" stroke="#000" stroke-width="3"/>
    <text x="95" y="206" text-anchor="end">3000</text>
    <!-- 3500 -->
    <line x1="140" y1="120" x2="122" y2="120" stroke="#000" stroke-width="3"/>
    <text x="95" y="128" text-anchor="end">3500</text>
  </g>

  <!-- Y-axis label -->
  <text x="40" y="390" transform="rotate(-90 40,390)"
        font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="600">
    Elevation (m)
  </text>

  <!-- X-axis ticks and labels (0 to 300 km) -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#000">
    <!-- mapping: x = 140 + (km/300)*1180 -->
    <line x1="140" y1="660" x2="140" y2="680" stroke="#000" stroke-width="3"/>
    <text x="140" y="710" text-anchor="middle">0</text>

    <line x1="415" y1="660" x2="415" y2="680" stroke="#000" stroke-width="3"/>
    <text x="415" y="710" text-anchor="middle">70</text>

    <line x1="533" y1="660" x2="533" y2="680" stroke="#000" stroke-width="3"/>
    <text x="533" y="710" text-anchor="middle">100</text>

    <line x1="730" y1="660" x2="730" y2="680" stroke="#000" stroke-width="3"/>
    <text x="730" y="710" text-anchor="middle">150</text>

    <line x1="926" y1="660" x2="926" y2="680" stroke="#000" stroke-width="3"/>
    <text x="926" y="710" text-anchor="middle">200</text>

    <line x1="1123" y1="660" x2="1123" y2="680" stroke="#000" stroke-width="3"/>
    <text x="1123" y="710" text-anchor="middle">250</text>

    <line x1="1320" y1="660" x2="1320" y2="680" stroke="#000" stroke-width="3"/>
    <text x="1320" y="710" text-anchor="middle">300</text>
  </g>

  <!-- X-axis label -->
  <text x="730" y="770" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="600">
    Distance from Coast (km)
  </text>

  <!-- Terrain profile (approximation) -->
  <!-- Coordinate system: y=660 baseline. Peak approx 3000m ~ y ~ 198. -->
  <path d="
      M 140 660
      L 140 360
      C 180 320, 220 260, 270 235
      C 315 210, 340 215, 375 245
      C 420 285, 450 355, 485 405
      C 520 455, 560 500, 610 520
      C 675 545, 740 555, 820 585
      C 900 615, 980 625, 1070 635
      C 1140 642, 1200 648, 1240 652
      C 1265 655, 1290 656, 1320 656
      L 1320 660
      Z"
    fill="url(#terrainGrad)" stroke="#000" stroke-width="3" stroke-linejoin="round"/>

  <!-- Ocean strip at far right -->
  <path d="
      M 1240 660
      L 1240 652
      C 1268 650, 1295 650, 1320 650
      L 1320 660
      Z"
    fill="url(#oceanGrad)" stroke="#000" stroke-width="3" stroke-linejoin="round"/>

  <!-- Direction arrows and labels -->
  <g font-family="Helvetica, Arial, sans-serif" fill="#000">
    <!-- Mauka left -->
    <line x1="300" y1="135" x2="170" y2="135" stroke="#000" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="310" y="120" font-size="28" font-weight="600">Mauka</text>
    <text x="310" y="150" font-size="24">(Mountains)</text>

    <!-- Makai right (top) -->
    <line x1="1100" y1="135" x2="1295" y2="135" stroke="#000" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="1090" y="120" font-size="28" font-weight="600">Makai</text>
    <text x="1090" y="150" font-size="24">(Ocean)</text>

    <!-- Makai right (mid) -->
    <line x1="1100" y1="440" x2="1295" y2="440" stroke="#000" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="1090" y="425" font-size="28" font-weight="600">Makai (Ocean)</text>
  </g>

  <!-- Zone labels -->
  <g font-family="Helvetica, Arial, sans-serif" fill="#000">
    <text x="390" y="250" font-size="46" font-weight="600">Mountain Range</text>
    <text x="520" y="410" font-size="46" font-weight="600">Upland Forest</text>
    <text x="705" y="520" font-size="40" font-weight="600">Agricultural</text>
    <text x="770" y="565" font-size="40" font-weight="600">Zone</text>
    <text x="900" y="610" font-size="46" font-weight="600">Coastal Plain</text>
    <text x="1210" y="640" font-size="40" font-weight="600">Ocean</text>
  </g>

  <!-- Caption -->
  <g font-family="Times New Roman, Times, serif" fill="#000">
    <text x="730" y="740" text-anchor="middle" font-size="30" font-weight="700">
      Figure 3.2: Regional Topography, Mauka to Makai
    </text>
    <text x="730" y="790" text-anchor="middle" font-size="26">
      Elevation section/profile from mountains to coast showing gradient.
    </text>
  </g>

</svg>
