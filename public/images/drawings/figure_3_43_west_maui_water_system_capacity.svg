<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="900" viewBox="0 0 1800 900">
  <defs>
    <linearGradient id="panelBG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e7f0f6"/>
      <stop offset="100%" stop-color="#f7fbff"/>
    </linearGradient>

    <linearGradient id="barRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b10000"/>
      <stop offset="100%" stop-color="#7b0000"/>
    </linearGradient>

    <marker id="arrowRed" markerWidth="18" markerHeight="18" refX="16" refY="9"
            orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L18,9 L0,18 z" fill="#8b0000"/>
    </marker>

    <style>
      .title { font-family: Helvetica, Arial, sans-serif; font-size: 40px; font-weight: 900; fill:#000; }
      .axisLbl { font-family: Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 700; fill:#000; }
      .tick { font-family: Helvetica, Arial, sans-serif; font-size: 22px; fill:#000; }
      .bold { font-family: Helvetica, Arial, sans-serif; font-weight: 800; }
      .note { font-family: Helvetica, Arial, sans-serif; font-size: 16px; fill:#000; }
      .panelTitle { font-family: Helvetica, Arial, sans-serif; font-size: 30px; font-weight: 900; fill:#000; }
      .panelTxt { font-family: Helvetica, Arial, sans-serif; font-size: 22px; fill:#000; }
      .panelHdr { font-family: Helvetica, Arial, sans-serif; font-size: 24px; font-weight: 800; fill:#000; }
      .grid { stroke:#c9c9c9; stroke-width:2; }
      .axis { stroke:#000; stroke-width:4; }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="900" fill="#fff"/>

  <!-- Title -->
  <text x="60" y="65" class="title">Figure 3.43: West Maui Water System Capacity: Demand Exceeding Supply (2023-2027)</text>

  <!-- CHART AREA -->
  <!-- Chart frame: x=70..1100, y=110..840 -->
  <g id="chart">
    <!-- Plot area -->
    <rect x="70" y="110" width="1030" height="730" fill="#fff" stroke="none"/>

    <!-- Gridlines (0..7) -->
    <!-- y0=780 baseline, height=620 for 0..7 -->
    <g class="grid">
      <line x1="120" y1="780" x2="1070" y2="780"/>
      <line x1="120" y1="691.4" x2="1070" y2="691.4"/>
      <line x1="120" y1="602.9" x2="1070" y2="602.9"/>
      <line x1="120" y1="514.3" x2="1070" y2="514.3"/>
      <line x1="120" y1="425.7" x2="1070" y2="425.7"/>
      <line x1="120" y1="337.1" x2="1070" y2="337.1"/>
      <line x1="120" y1="248.6" x2="1070" y2="248.6"/>
      <line x1="120" y1="160" x2="1070" y2="160"/>
    </g>

    <!-- Axes -->
    <line x1="120" y1="160" x2="120" y2="780" class="axis"/>
    <line x1="120" y1="780" x2="1070" y2="780" class="axis"/>

    <!-- Y ticks -->
    <g class="tick">
      <text x="95" y="788" text-anchor="end">0</text>
      <text x="95" y="699" text-anchor="end">1</text>
      <text x="95" y="611" text-anchor="end">2</text>
      <text x="95" y="522" text-anchor="end">3</text>
      <text x="95" y="434" text-anchor="end">4</text>
      <text x="95" y="345" text-anchor="end">5</text>
      <text x="95" y="257" text-anchor="end">6</text>
      <text x="95" y="168" text-anchor="end">7</text>
    </g>

    <!-- Y label -->
    <text x="30" y="470" transform="rotate(-90 30,470)" class="axisLbl">
      Volume (MGD - Million Gallons per Day)
    </text>

    <!-- X labels -->
    <text x="360" y="835" text-anchor="middle" class="axisLbl">Pre-Fire Demand (Avg)</text>
    <text x="820" y="835" text-anchor="middle" class="axisLbl">Projected Demand 2027</text>

    <!-- Shaded bands behind bars -->
    <rect x="270" y="160" width="240" height="620" fill="#e9e9e9" opacity="0.8"/>
    <rect x="720" y="160" width="240" height="620" fill="#e9e9e9" opacity="0.8"/>

    <!-- MRC line at 4.26 MGD -->
    <!-- map value->y: y=780 - (value/7)*620 -->
    <!-- 4.26 -> y ≈ 780 - (4.26/7)*620 = 780 - 377.5 = 402.5 -->
    <line x1="120" y1="402.5" x2="1070" y2="402.5" stroke="#1f6aa5" stroke-width="8"/>
    <text x="130" y="390" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="800" fill="#1f6aa5">4.26 MGD</text>
    <text x="130" y="430" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="800" fill="#1f6aa5">
      Max Reliable Capacity (MRC)
    </text>
    <text x="130" y="460" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#1f6aa5">
      Sustainable Limit
    </text>
    <text x="130" y="490" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#1f6aa5">
      [Source: DWS/CWRM]
    </text>

    <!-- Bars -->
    <!-- Pre-fire: 5.50 -> y=780-(5.5/7)*620=780-487.1=292.9 ; height=487.1 -->
    <rect x="320" y="292.9" width="160" height="487.1" fill="url(#barRed)" stroke="#6a0000" stroke-width="2"/>
    <!-- Projected: 6.04 -> y=780-(6.04/7)*620=780-535.1=244.9 ; height=535.1 -->
    <rect x="770" y="244.9" width="160" height="535.1" fill="url(#barRed)" stroke="#6a0000" stroke-width="2"/>

    <!-- Bar annotations -->
    <g font-family="Helvetica, Arial, sans-serif" fill="#000">
      <text x="400" y="215" text-anchor="middle" font-size="26" font-weight="900">Pre-Fire Demand (Avg)</text>
      <text x="400" y="245" text-anchor="middle" font-size="26" font-weight="900">5.50 MGD (129% of MRC)</text>
      <text x="400" y="275" text-anchor="middle" font-size="22">[Source: DWS Data]</text>

      <text x="850" y="180" text-anchor="middle" font-size="26" font-weight="900">Projected Demand 2027</text>
      <text x="850" y="210" text-anchor="middle" font-size="26" font-weight="900">6.04 MGD (141.8% of MRC)</text>
      <text x="850" y="240" text-anchor="middle" font-size="22">[Source: DWS Projections]</text>
    </g>

    <!-- Increase arrows -->
    <g stroke="#8b0000" stroke-width="10" fill="none" marker-end="url(#arrowRed)" stroke-linecap="round">
      <line x1="520" y1="402.5" x2="520" y2="300"/>
      <line x1="970" y1="402.5" x2="970" y2="255"/>
    </g>
    <g font-family="Helvetica, Arial, sans-serif" fill="#8b0000">
      <text x="545" y="355" font-size="24" font-weight="900">+1.24 MGD /</text>
      <text x="545" y="385" font-size="24" font-weight="900">+29%</text>

      <text x="995" y="315" font-size="24" font-weight="900">+1.78 MGD /</text>
      <text x="995" y="345" font-size="24" font-weight="900">+41.8%</text>
    </g>

    <!-- Deficit callout -->
    <rect x="560" y="470" width="220" height="170" fill="#fff" stroke="#8b0000" stroke-width="6"/>
    <text x="670" y="520" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="900" fill="#8b0000">
      Projected
    </text>
    <text x="670" y="555" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="900" fill="#8b0000">
      Deficit
    </text>
    <text x="670" y="590" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="900" fill="#8b0000">
      (2027):
    </text>
    <text x="670" y="630" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="900" fill="#8b0000">
      -1.78 MGD
    </text>

    <!-- Source note -->
    <text x="70" y="875" class="note">
      Source Note: MGD figures and projections sourced from DWS and CWRM documents. Verified constraint/hardening items sourced from post-fire assessments and county recovery plans.
    </text>
  </g>

  <!-- SIDE PANEL -->
  <g id="panel">
    <rect x="1140" y="140" width="610" height="650" rx="28" ry="28" fill="url(#panelBG)" stroke="#d0d8df" stroke-width="3"/>
    <text x="1445" y="205" text-anchor="middle" class="panelTitle">Key Infrastructure Constraints</text>
    <text x="1445" y="240" text-anchor="middle" class="panelTitle">&amp; Vulnerabilities (Verified)</text>

    <!-- Icon + text rows -->
    <!-- Row helper positions -->
    <g transform="translate(1180,290)">
      <!-- 1 -->
      <circle cx="40" cy="30" r="28" fill="#1f6aa5"/>
      <path d="M28 18 L52 42 M52 18 L28 42" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
      <text x="100" y="25" class="panelHdr">Stage 2 Water Shortage:</text>
      <text x="100" y="55" class="panelTxt">New meters restricted</text>
      <text x="100" y="85" class="panelTxt">(Active Sept 4, 2025)</text>

      <!-- 2 -->
      <g transform="translate(0,130)">
        <rect x="18" y="10" width="44" height="44" fill="#1f6aa5" rx="6"/>
        <path d="M30 22 L50 42" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
        <path d="M50 22 L30 42" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
        <text x="100" y="25" class="panelHdr">New Demand Classification:</text>
        <text x="100" y="55" class="panelTxt">Rebuilding homes viewed</text>
        <text x="100" y="85" class="panelTxt">as new demand</text>
      </g>

      <!-- 3 -->
      <g transform="translate(0,260)">
        <path d="M40 5 C55 25, 58 40, 40 60 C22 40, 25 25, 40 5 Z" fill="#1f6aa5"/>
        <rect x="22" y="60" width="36" height="10" fill="#1f6aa5"/>
        <text x="100" y="25" class="panelHdr">System Vulnerabilities:</text>
        <text x="100" y="55" class="panelTxt">Power loss, depressurization,</text>
        <text x="100" y="85" class="panelTxt">HDPE melting [Source: DWS</text>
        <text x="100" y="115" class="panelTxt">Post-Fire Assessment]</text>
      </g>

      <!-- 4 -->
      <g transform="translate(0,420)">
        <path d="M15 60 L15 15 L65 15 L65 60" fill="none" stroke="#1f6aa5" stroke-width="6" stroke-linejoin="round"/>
        <path d="M40 15 L40 60" stroke="#1f6aa5" stroke-width="6"/>
        <circle cx="40" cy="45" r="6" fill="#1f6aa5"/>
        <text x="100" y="25" class="panelHdr">Management Shift:</text>
        <text x="100" y="55" class="panelTxt">State CWRM control (Water</text>
        <text x="100" y="85" class="panelTxt">Management Area, June 2022)</text>
      </g>

      <!-- 5 -->
      <g transform="translate(0,560)">
        <path d="M40 10 L55 20 L60 40 L50 55 L30 55 L20 40 L25 20 Z" fill="#1f6aa5"/>
        <circle cx="40" cy="35" r="10" fill="#fff" opacity="0.9"/>
        <text x="100" y="25" class="panelHdr">Proposed Hardening:</text>
        <text x="100" y="55" class="panelTxt">Fire-resistant materials, backup</text>
        <text x="100" y="85" class="panelTxt">generators, recycled water</text>
        <text x="100" y="115" class="panelTxt">expansion [Source: County</text>
        <text x="100" y="145" class="panelTxt">Recovery Plan]</text>
      </g>
    </g>
  </g>

</svg>
