<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">

  <defs>
    <style>
      .header { font-family: Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #ffffff; }
      .cellTitle { font-family: Helvetica, Arial, sans-serif; font-size: 26px; font-weight: 600; fill: #000000; }
      .cellText { font-family: Helvetica, Arial, sans-serif; font-size: 24px; fill: #000000; }
      .label { font-family: Helvetica, Arial, sans-serif; font-size: 18px; fill: #000000; }
      .grid { stroke: #000000; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <text x="800" y="50" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="42" font-weight="700">
    Figure 3.14: Housing Typologies Matrix (Capped at 4 Stories)
  </text>

  <rect x="50" y="90" width="1500" height="70" fill="#2f4f5f"/>
  <text x="150" y="135" class="header">TYPOLOGY</text>
  <text x="500" y="135" class="header">SECTION (4 STORIES MAX)</text>
  <text x="900" y="135" class="header">PLAN (TYPICAL FLOOR)</text>
  <text x="1250" y="135" class="header">DENSITY / DESCRIPTION</text>

  <rect x="50" y="90" width="1500" height="700" class="grid"/>
  <line x1="350" y1="90" x2="350" y2="790" class="grid"/>
  <line x1="750" y1="90" x2="750" y2="790" class="grid"/>
  <line x1="1150" y1="90" x2="1150" y2="790" class="grid"/>

  <line x1="50" y1="260" x2="1550" y2="260" class="grid"/>
  <line x1="50" y1="430" x2="1550" y2="430" class="grid"/>
  <line x1="50" y1="600" x2="1550" y2="600" class="grid"/>

  <text x="120" y="220" class="cellTitle">Row House</text>

  <rect x="420" y="190" width="260" height="120" fill="#e6d6b8" stroke="#000" stroke-width="2"/>
  <line x1="420" y1="220" x2="680" y2="220" stroke="#000" stroke-width="2"/>
  <line x1="420" y1="250" x2="680" y2="250" stroke="#000" stroke-width="2"/>
  <line x1="420" y1="280" x2="680" y2="280" stroke="#000" stroke-width="2"/>
  <text x="690" y="210" class="label">L4</text>
  <text x="690" y="240" class="label">L3</text>
  <text x="690" y="270" class="label">L2</text>
  <text x="690" y="300" class="label">L1</text>

  <rect x="820" y="190" width="260" height="120" fill="#f2eadc" stroke="#000" stroke-width="2"/>
  <line x1="950" y1="190" x2="950" y2="310" stroke="#000" stroke-width="2"/>

  <text x="1180" y="230" class="cellText">Medium Density,</text>
  <text x="1180" y="260" class="cellText">Individual Entrance</text>

  <text x="120" y="390" class="cellTitle">Courtyard Apartment</text>

  <rect x="420" y="360" width="260" height="120" fill="#d9e4cf" stroke="#000" stroke-width="2"/>
  <rect x="500" y="395" width="100" height="60" fill="#b5c8a5" stroke="#000" stroke-width="2"/>
  <line x1="420" y1="390" x2="680" y2="390" stroke="#000" stroke-width="2"/>
  <line x1="420" y1="420" x2="680" y2="420" stroke="#000" stroke-width="2"/>
  <line x1="420" y1="450" x2="680" y2="450" stroke="#000" stroke-width="2"/>

  <rect x="820" y="360" width="260" height="120" fill="#eef3e8" stroke="#000" stroke-width="2"/>
  <rect x="900" y="400" width="100" height="60" fill="#b5c8a5" stroke="#000" stroke-width="2"/>

  <text x="1180" y="400" class="cellText">Medium-High Density,</text>
  <text x="1180" y="430" class="cellText">Shared Open Space</text>

  <text x="120" y="560" class="cellTitle">Podium Building</text>

  <rect x="420" y="530" width="260" height="120" fill="#e3d2c2" stroke="#000" stroke-width="2"/>
  <rect x="420" y="630" width="260" height="20" fill="#c1b09a" stroke="#000" stroke-width="2"/>
  <line x1="420" y1="560" x2="680" y2="560" stroke="#000" stroke-width="2"/>
  <line x1="420" y1="590" x2="680" y2="590" stroke="#000" stroke-width="2"/>

  <rect x="820" y="530" width="260" height="120" fill="#f0e4d8" stroke="#000" stroke-width="2"/>
  <line x1="950" y1="530" x2="950" y2="650" stroke="#000" stroke-width="2"/>

  <text x="1180" y="570" class="cellText">High Density,</text>
  <text x="1180" y="600" class="cellText">Mixed-Use Base</text>

  <text x="120" y="730" class="cellTitle">Stacked Townhouse</text>

  <rect x="420" y="700" width="260" height="80" fill="#dfe8d8" stroke="#000" stroke-width="2"/>
  <line x1="420" y1="725" x2="680" y2="725" stroke="#000" stroke-width="2"/>
  <line x1="420" y1="750" x2="680" y2="750" stroke="#000" stroke-width="2"/>

  <rect x="820" y="700" width="260" height="80" fill="#eef3e8" stroke="#000" stroke-width="2"/>
  <line x1="950" y1="700" x2="950" y2="780" stroke="#000" stroke-width="2"/>

  <text x="1180" y="735" class="cellText">Medium Density,</text>
  <text x="1180" y="765" class="cellText">Vertical Units</text>

</svg>
